name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint commit messages (Conventional Commits)
        if: matrix.python-version == '3.12'
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run gitlint --commits "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            uv run gitlint --commits "$AFTER"
          else
            uv run gitlint --commits "$BEFORE..$AFTER"
          fi

      - name: Ruff
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy packages/pickled-core/src packages/pickled-bdd/src packages/pickled-law/src

      - name: Pytest
        run: uv run pytest -q
