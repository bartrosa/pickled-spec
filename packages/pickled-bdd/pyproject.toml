[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pickled-bdd"
version = "0.1.0.dev0"
description = "LLM-to-Gherkin bridge with deterministic verification."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Bart Rosa" }]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing :: BDD",
    "Typing :: Typed",
]
dependencies = [
    "pickled-core",
    "gherkin-official>=29.0",
    "pytest-bdd>=7.0",
    "click>=8.1",
]

[project.scripts]
pickled-bdd = "pickled_bdd.cli:main"

[tool.uv.sources]
pickled-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/pickled_bdd"]
