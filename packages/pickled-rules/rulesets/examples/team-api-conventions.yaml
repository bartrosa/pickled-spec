metadata:
  source_id: "TEAM-API-CONV"
  source_title: "Backend Team API Conventions"
  applies_to: "backend-services"
  maintainer: "Backend Platform Team"
  source_version: "1.2"
  active_from: "2025-09-01"
  source_url: null

rules:
  - id: "naming.1"
    title: "Resource paths are plural nouns"
    description: |
      REST resource collections are addressed by plural lowercase nouns;
      singular paths are reserved for singleton resources by id.
    enforcement: "strict"

  - id: "naming.2"
    title: "Version prefix is mandatory"
    description: |
      All public endpoints live under /v{N}/ where N is a positive integer.
    enforcement: "strict"

  - id: "errors.1"
    title: "Errors use Problem Details (RFC 7807)"
    description: |
      Error responses use application/problem+json with type, title, status,
      and detail fields.
    enforcement: "strict"

  - id: "pagination.1"
    title: "Cursor-based pagination preferred"
    description: |
      List endpoints expose cursor-based pagination with next and prev links.
    enforcement: "advisory"

  - id: "timestamps.1"
    title: "Timestamps are RFC 3339 in UTC"
    description: |
      All datetime fields in JSON bodies use RFC 3339 with a Z suffix for UTC.
    enforcement: "strict"

  - id: "deprecation.1"
    title: "Deprecated endpoints carry the Sunset header"
    description: |
      Responses from deprecated routes include a Sunset header with the
      planned removal date.
    enforcement: "informational"
